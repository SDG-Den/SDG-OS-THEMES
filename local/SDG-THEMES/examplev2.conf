[Theme]
name =                    # Display name for menus and notifications
description =             # One-line description
wallpaper =               # Filename relative to theme dir, or absolute path

[Colors]
preset_type =             # DMS | generic | matugen | path
preset_identifier =       # DMS: theme name   | generic: color name
                          # matugen: variant  | path: /full/path/theme.json
mode =                    # dark | light

[Fonts]
family =                  # Font family for DMS UI and mangoWM jump/bar

[Borders]
thickness =               # Bar border thickness (px) — also sets mangoWM borderpx
corner_radius =           # UI + compositor corner radius (px)
widget_borders =          # true | false — border around individual bar widgets

[Bars]
enabled_bars =            # comma-separated: top, bottom, left, right

[Animations]
enabled =                 # true | false

[Dock]
enabled =                 # true | false
